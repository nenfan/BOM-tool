<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM修改项计算工具（最终修复版）</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }
        .login-box {
            width: 380px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #2980b9;
        }
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: bold;
        }
        .upload-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .upload-card {
            flex: 1;
            min-width: 320px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            color: #3498db;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .file-upload {
            position: relative;
            display: inline-block;
        }
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 1;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        .upload-btn:hover {
            background-color: #2980b9;
        }
        .file-name {
            margin-top: 12px;
            color: #666;
            font-size: 14px;
        }
        .calc-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 14px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .calc-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: none;
        }
        .result-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .download-btn, .copy-btn {
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .download-btn {
            background-color: #f39c12;
        }
        .copy-btn {
            background-color: #27ae60;
        }
        .table-container {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #f8f9fa;
            padding: 10px;
            text-align: left;
        }
        td {
            padding: 9px;
            border-bottom: 1px solid #f1f1f1;
        }
        .del-row td {
            background: #fff5f5;
            color: #c0392b;
        }
        .add-row td {
            background: #f1f9f7;
            color: #27ae60;
        }
        /* 新增修改密码按钮样式（仅新增，不修改原有样式） */
        .pwd-modify-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .pwd-modify-btn:hover {
            background: #8e44ad;
        }
        /* 修改密码弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            width: 350px;
            padding: 25px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .modal-content button {
            width: 48%;
            padding: 10px;
            margin: 8px 1%;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        .modal-confirm {
            background: #27ae60;
        }
        .modal-cancel {
            background: #e74c3c;
        }
    </style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>BOM 修改项计算工具</h2>
    <input type="password" id="password" placeholder="请输入登录密码">
    <button onclick="login()">登录</button>
</div>

<div class="container" id="mainContainer">
    <!-- 新增修改密码按钮 -->
    <button class="pwd-modify-btn" onclick="openPwdModal()">修改密码</button>
    
    <h1 class="title">BOM修改项计算工具（最终正确版）</h1>
    <div class="upload-section">
        <div class="upload-card">
            <h3 class="card-title">1. 上传 A→B 修改项</h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ab" accept=".xlsx, .xls">
            </div>
            <div id="file-ab-name" class="file-name">未选择文件</div>
        </div>
        <div class="upload-card">
            <h3 class="card-title">2. 上传 A→C 修改项</h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ac" accept=".xlsx, .xls">
            </div>
            <div id="file-ac-name" class="file-name">未选择文件</div>
        </div>
    </div>

    <button id="calc-btn" class="calc-btn" disabled>计算 B→C 修改项</button>

    <div class="result-section" id="result-section">
        <div class="result-title">
            <span>B→C 计算结果</span>
            <div>
                <button class="copy-btn" id="copy-btn">复制</button>
                <button class="download-btn" id="download-btn">导出Excel</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>物料编码</th><th>物料描述</th><th>位号</th><th>操作</th><th>数量</th><th>备注</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal" id="pwdModal">
    <div class="modal-content">
        <h3>修改登录密码</h3>
        <input type="password" id="oldPwd" placeholder="请输入原密码">
        <input type="password" id="secretKey" placeholder="请输入秘钥">
        <input type="password" id="newPwd" placeholder="请输入新密码">
        <input type="password" id="confirmNewPwd" placeholder="请确认新密码">
        <button class="modal-confirm" onclick="modifyPassword()">确认修改</button>
        <button class="modal-cancel" onclick="closePwdModal()">取消</button>
    </div>
</div>

<script>
// 1. 初始密码改为 CVTE
let CURRENT_PWD = "CVTE"; 
const SECRET_KEY = "panshukun"; // 固定秘钥

function login() {
    if (document.getElementById("password").value === CURRENT_PWD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
    } else {
        alert("密码错误");
    }
}

// 2. 新增修改密码相关函数（仅新增，不修改原有逻辑）
function openPwdModal() {
    document.getElementById("pwdModal").style.display = "flex";
}

function closePwdModal() {
    document.getElementById("pwdModal").style.display = "none";
    // 清空输入框
    document.getElementById("oldPwd").value = "";
    document.getElementById("secretKey").value = "";
    document.getElementById("newPwd").value = "";
    document.getElementById("confirmNewPwd").value = "";
}

function modifyPassword() {
    const oldPwd = document.getElementById("oldPwd").value.trim();
    const secretKey = document.getElementById("secretKey").value.trim();
    const newPwd = document.getElementById("newPwd").value.trim();
    const confirmNewPwd = document.getElementById("confirmNewPwd").value.trim();

    // 校验
    if (oldPwd !== CURRENT_PWD) {
        alert("原密码错误！");
        return;
    }
    if (secretKey !== SECRET_KEY) {
        alert("秘钥错误！");
        return;
    }
    if (newPwd === "") {
        alert("新密码不能为空！");
        return;
    }
    if (newPwd !== confirmNewPwd) {
        alert("两次输入的新密码不一致！");
        return;
    }

    // 修改密码
    CURRENT_PWD = newPwd;
    alert("密码修改成功！请使用新密码登录");
    closePwdModal();
    // 退出登录，返回登录页
    document.getElementById("mainContainer").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("password").value = "";
}

// 原有工具类（完全未改）
const LocUtils = {
    split: s => s ? s.split(/[,，\s]+/).filter(x => x) : [],
    merge: arr => arr.sort().join(",")
};

// 原有文件加载函数（完全未改）
function loadFile(type, input, nameElem) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
        const data = [];
        const head = json[0].map(c => (c + "").toLowerCase());
        const idx = {
            pn: head.findIndex(h => h.includes("物料编码") || h.includes("料号")),
            desc: head.findIndex(h => h.includes("物料描述")),
            loc: head.findIndex(h => h.includes("位号")),
            act: head.findIndex(h => h.includes("操作"))
        };
        for (let i = 1; i < json.length; i++) {
            const r = json[i];
            const act = (r[idx.act] + "").trim().toUpperCase();
            if (!["ADD", "DELETE", "DEL"].includes(act)) continue;
            const locs = LocUtils.split(r[idx.loc] + "");
            locs.forEach(loc => {
                data.push({
                    partNum: r[idx.pn] + "",
                    partDesc: r[idx.desc] + "",
                    loc,
                    action: act === "DEL" ? "DELETE" : act
                });
            });
        }
        if (type === "ab") abSingleData = data;
        else acSingleData = data;
        nameElem.textContent = `已加载 ${data.length} 条位号`;
        checkEnable();
    };
    reader.readAsArrayBuffer(file);
}

// 原有启用校验函数（完全未改）
function checkEnable() {
    document.getElementById("calc-btn").disabled = !(abSingleData.length && acSingleData.length);
}

// 原有文件绑定事件（完全未改）
document.getElementById("file-ab").addEventListener("change", e => {
    loadFile("ab", e.target, document.getElementById("file-ab-name"));
});
document.getElementById("file-ac").addEventListener("change", e => {
    loadFile("ac", e.target, document.getElementById("file-ac-name"));
});

// 原有核心计算逻辑（完全未改）
document.getElementById("calc-btn").onclick = () => {
    const abMap = new Map(abSingleData.map(x => [x.loc, x]));
    const acMap = new Map(acSingleData.map(x => [x.loc, x]));
    const allLoc = new Set([...abMap.keys(), ...acMap.keys()]);
    const res = [];

    for (const loc of allLoc) {
        const ab = abMap.get(loc); // A→B的操作
        const ac = acMap.get(loc); // A→C的操作

        // ---------- 步骤1：联合推断A原始状态 ----------
        let A_has = true;
        if (ab?.action === "ADD" || ac?.action === "ADD") {
            A_has = false; // 只要有一个ADD，说明A原本没有该位号
        }

        // ---------- 步骤2：计算B最终状态 ----------
        let B_has = A_has;
        let B_part = ab?.partNum || null;
        if (ab) {
            if (ab.action === "ADD") B_has = true;   // A→B加新 → B有
            if (ab.action === "DELETE") B_has = false;// A→B删除 → B无
        }

        // ---------- 步骤3：计算C最终状态 ----------
        let C_has = A_has;
        let C_part = ac?.partNum || null;
        if (ac) {
            if (ac.action === "ADD") C_has = true;   // A→C加新 → C有
            if (ac.action === "DELETE") C_has = false;// A→C删除 → C无
        }

        // ---------- 步骤4：完整对比B和C，覆盖所有场景 ----------
        // 场景1：B有 C无 → 删除B
        if (B_has && !C_has) {
            res.push({ 
                partNum: B_part, 
                partDesc: ab?.partDesc || ac?.partDesc || "",
                loc, 
                action: "DELETE", 
                remark: `A原${A_has?"有":"无"}, B有C无 → 删除` 
            });
        }
        // 场景2：B无 C有 → 新增C
        else if (!B_has && C_has) {
            res.push({ 
                partNum: C_part, 
                partDesc: ac?.partDesc || ab?.partDesc || "",
                loc, 
                action: "ADD", 
                remark: `A原${A_has?"有":"无"}, B无C有 → 新增` 
            });
        }
        // 场景3：B有 C有 → 分两种情况
        else if (B_has && C_has) {
            // 子场景3.1：料号不同 → 先删B旧的，再加C新的
            if (B_part !== C_part) {
                res.push({ 
                    partNum: B_part, 
                    partDesc: ab?.partDesc || "",
                    loc, 
                    action: "DELETE", 
                    remark: "料号不同 → 删B旧项" 
                });
                res.push({ 
                    partNum: C_part, 
                    partDesc: ac?.partDesc || "",
                    loc, 
                    action: "ADD", 
                    remark: "料号不同 → 加C新项" 
                });
            }
            // 子场景3.2：双ADD（A无，B/C都加新但料号不同）→ 先删B再加C
            else if (ab?.action === "ADD" && ac?.action === "ADD" && B_part !== C_part) {
                res.push({ 
                    partNum: B_part, 
                    partDesc: ab?.partDesc || "",
                    loc, 
                    action: "DELETE", 
                    remark: "双ADD料号不同 → 删B旧项" 
                });
                res.push({ 
                    partNum: C_part, 
                    partDesc: ac?.partDesc || "",
                    loc, 
                    action: "ADD", 
                    remark: "双ADD料号不同 → 加C新项" 
                });
            }
        }
    }

    // ---------- 步骤5：合并位号 + 统计数量 ----------
    const group = new Map();
    res.forEach(item => {
        const key = `${item.action}-${item.partNum}-${item.partDesc}`;
        if (!group.has(key)) group.set(key, { ...item, locs: [] });
        group.get(key).locs.push(item.loc);
    });

    const result = Array.from(group.values()).map(g => ({
        ...g,
        loc: LocUtils.merge(g.locs),
        qty: g.locs.length // 新增数量统计
    }));

    // ---------- 步骤6：渲染结果 ----------
    const tb = document.getElementById("result-body");
    tb.innerHTML = "";
    result.forEach(item => {
        const tr = document.createElement("tr");
        tr.className = item.action === "DELETE" ? "del-row" : "add-row";
        tr.innerHTML = `
            <td>${item.partNum}</td>
            <td>${item.partDesc}</td>
            <td>${item.loc}</td>
            <td>${item.action}</td>
            <td>${item.qty}</td> <!-- 数量列 -->
            <td>${item.remark}</td>
        `;
        tb.appendChild(tr);
    });
    document.getElementById("result-section").style.display = "block";
};

// 原有导出Excel函数（完全未改）
document.getElementById("download-btn").onclick = () => {
    const rows = [["物料编码", "物料描述", "位号", "操作", "数量", "备注"]];
    document.querySelectorAll("#result-body tr").forEach(tr => {
        rows.push(Array.from(tr.querySelectorAll("td")).map(td => td.textContent));
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "B→C修改项");
    XLSX.writeFile(wb, "B_to_C修改项.xlsx");
};

// 原有复制函数（完全未改）
document.getElementById("copy-btn").onclick = async () => {
    const text = Array.from(document.querySelectorAll("#result-body tr"))
        .map(tr => tr.textContent.replace(/\s+/g, "\t"))
        .join("\n");
    await navigator.clipboard.writeText("物料编码\t物料描述\t位号\t操作\t数量\t备注\n" + text);
    alert("已复制到剪贴板");
};
</script>
</body>
</html>
