<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM修改项计算工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }
        .login-box, .change-box {
            width: 380px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .change-box {
            display: none;
            margin: 80px auto;
        }
        .login-box h2, .change-box h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .login-box input, .change-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-box button, .change-box button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .login-box button:hover, .change-box button:hover {
            background: #2980b9;
        }
        .change-btn {
            background: #95a5a6 !important;
        }
        .btn-success {
            background: #27ae60 !important;
        }

        /* ========== 原有样式完全保留 ========== */
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: bold;
        }
        .upload-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .upload-card {
            flex: 1;
            min-width: 320px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            color: #3498db;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-upload {
            position: relative;
            display: inline-block;
        }
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 1;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.3s;
        }
        .upload-btn:hover {
            background-color: #2980b9;
        }
        .file-name {
            margin-top: 12px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            min-height: 21px;
        }
        .calc-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 14px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .calc-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #888;
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: none;
        }
        .result-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px; /* 新增：按钮之间留间距 */
        }
        .download-btn, .copy-btn { /* 新增：复制按钮样式，和下载按钮统一 */
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .download-btn {
            background-color: #f39c12;
        }
        .download-btn:hover {
            background-color: #e67e22;
        }
        .copy-btn { /* 新增：复制按钮独立样式 */
            background-color: #27ae60;
        }
        .copy-btn:hover {
            background-color: #219653;
        }
        .table-container {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }
        th {
            background-color: #f8f9fa;
            color: #34495e;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 10px 12px;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            color: #2c3e50;
            padding: 9px 12px;
            border-bottom: 1px solid #f1f1f1;
            white-space: nowrap;
        }
        tr:hover td {
            background-color: #fafbfc;
        }
        .del-row td {
            background-color: #fff5f5;
            color: #c0392b;
        }
        .add-row td {
            background-color: #f1f9f7;
            color: #27ae60;
        }
        .error提示 {
            color: #e74c3c;
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            padding: 15px;
        }
        .success提示 {
            color: #27ae60;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-box" id="loginBox">
    <h2>BOM 修改项计算工具</h2>
    <input type="password" id="password" placeholder="请输入登录密码">
    <button onclick="login()">登录</button>
    <button class="change-btn" onclick="showChange()">修改密码</button>
</div>

<!-- 修改密码界面 -->
<div class="change-box" id="changeBox">
    <h3>修改密码</h3>
    <input type="password" id="oldPwd" placeholder="原密码">
    <input type="password" id="secretKey" placeholder="安全密钥">
    <input type="password" id="newPwd" placeholder="新密码">
    <button class="btn-success" onclick="saveNewPwd()">保存新密码</button>
    <button class="change-btn" onclick="backToLogin()">返回登录</button>
</div>

<!-- 主界面（仅新增复制按钮，其他不变） -->
<div class="container" id="mainContainer">
    <h1 class="title">BOM修改项计算工具</h1>
    
    <div class="upload-section">
        <div class="upload-card">
            <h3 class="card-title">📄 1. 上传 A→B 修改项 Excel</h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ab" accept=".xlsx, .xls">
            </div>
            <div id="file-ab-name" class="file-name">未选择文件</div>
        </div>

        <div class="upload-card">
            <h3 class="card-title">📄 2. 上传 A→C 修改项 Excel</h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ac" accept=".xlsx, .xls">
            </div>
            <div id="file-ac-name" class="file-name">未选择文件</div>
        </div>
    </div>

    <button id="calc-btn" class="calc-btn" disabled>🔴 请先上传两个Excel文件</button>

    <div id="result-section" class="result-section">
        <div class="result-title">
            <span>✅ B→C 修改项计算结果</span>
            <!-- 新增：一键复制按钮，和下载按钮并排 -->
            <div>
                <button id="copy-btn" class="copy-btn">📋 一键复制</button>
                <button id="download-btn" class="download-btn">📥 下载Excel文件</button>
            </div>
        </div>
        <div class="table-container">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>修改项编码</th>
                        <th>产品型号</th>
                        <th>共用版本</th>
                        <th>物料编码</th>
                        <th>物料描述</th>
                        <th>数量</th>
                        <th>位号</th>
                        <th>操作</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// =============================================
// 初始密码 + 安全密钥（原有不变）
// =============================================
const DEFAULT_PASSWORD = "panshukun";
const SAFE_SECRET_KEY = "ADMIN123";

let currentPassword = localStorage.getItem("BOM_TOOL_PASSWORD") || DEFAULT_PASSWORD;

// =============================================
// 登录（原有不变）
// =============================================
function login() {
    let input = document.getElementById("password").value.trim();
    if (input === currentPassword) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
    } else {
        alert("密码错误");
    }
}

// =============================================
// 修改密码（原有不变）
// =============================================
function showChange() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("changeBox").style.display = "block";
}
function backToLogin() {
    document.getElementById("changeBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}
function saveNewPwd() {
    let old = document.getElementById("oldPwd").value.trim();
    let key = document.getElementById("secretKey").value.trim();
    let newPwd = document.getElementById("newPwd").value.trim();

    if (old !== currentPassword) { alert("原密码错误"); return; }
    if (key !== SAFE_SECRET_KEY) { alert("安全密钥错误"); return; }
    if (!newPwd) { alert("新密码不能为空"); return; }

    currentPassword = newPwd;
    localStorage.setItem("BOM_TOOL_PASSWORD", newPwd);
    alert("修改成功！下次登录使用新密码");
    backToLogin();
}

// =============================================
// 原有业务逻辑（完全不变）
// =============================================
let abSingleData = [];
let acSingleData = [];
let bcResult = [];

const LocUtils = {
    splitLocs: function (locStr) {
        if (!locStr) return [];
        return locStr.split(/[,，\s]+/).map(loc => loc.trim()).filter(loc => loc);
    },
    mergeLocs: function (locs) {
        if (!locs || locs.length === 0) return "";
        return locs.sort((a, b) => {
            const numA = parseInt(a.replace(/\D/g, "")) || 0;
            const numB = parseInt(b.replace(/\D/g, "")) || 0;
            const typeA = a.replace(/\d/g, "");
            const typeB = b.replace(/\d/g, "");
            return typeA === typeB ? numA - numB : typeA.localeCompare(typeB);
        }).join(",");
    }
};

window.onload = function () {
    document.getElementById('file-ab').addEventListener('change', (e) => handleFile(e, 'ab'));
    document.getElementById('file-ac').addEventListener('change', (e) => handleFile(e, 'ac'));
    document.getElementById('calc-btn').addEventListener('click', calculateBC);
    document.getElementById('download-btn').addEventListener('click', downloadExcel);
    // 新增：绑定复制按钮点击事件
    document.getElementById('copy-btn').addEventListener('click', copyTableData);
};

function handleFile(e, type) {
    const file = e.target.files[0];
    const fileNameElem = document.getElementById(`file-${type}-name`);
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls'].includes(ext)) {
        alert('仅支持.xlsx/.xls');
        fileNameElem.textContent = '不支持格式';
        e.target.value = '';
        return;
    }
    fileNameElem.textContent = `⏳ 读取中：${file.name}`;
    const reader = new FileReader();
    reader.onload = function (ev) {
        try {
            const data = new Uint8Array(ev.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (json.length < 2) throw new Error('无有效数据');

            const header = json[0].map(c => (c+'').toLowerCase().trim());
            const idx = {
                code: header.findIndex(h => h.includes('修改项编码')),
                product: header.findIndex(h => h.includes('产品型号')),
                version: header.findIndex(h => h.includes('共用版本')),
                partNum: header.findIndex(h => h.includes('物料编码')||h.includes('料号')),
                partDesc: header.findIndex(h => h.includes('物料描述')),
                qty: header.findIndex(h => h.includes('数量')),
                loc: header.findIndex(h => h.includes('位号')),
                action: header.findIndex(h => h.includes('操作')),
                remark: header.findIndex(h => h.includes('备注'))
            };

            const singleData = [];
            for (let i=1; i<json.length; i++) {
                const r = json[i];
                const locStr = (r[idx.loc]+'').trim();
                const act = (r[idx.action]+'').trim().toUpperCase();
                const pn = (r[idx.partNum]+'').trim();
                if (!locStr || !['ADD','DEL','DELETE'].includes(act)) continue;

                const locs = LocUtils.splitLocs(locStr);
                const act2 = act === 'DEL' ? 'DELETE' : 'ADD';
                locs.forEach(loc => {
                    singleData.push({
                        code: r[idx.code]+'',
                        product: r[idx.product]+'',
                        version: r[idx.version]+'',
                        partNum: pn,
                        partDesc: r[idx.partDesc]+'',
                        qty: 1,
                        loc: loc,
                        action: act2,
                        remark: r[idx.remark]+''
                    });
                });
            }

            if (type === 'ab') abSingleData = singleData;
            else acSingleData = singleData;

            fileNameElem.innerHTML = `✅ 已上传：${file.name}<br><span class='success提示'>有效位号：${singleData.length}</span>`;
            updateBtn();
        } catch (e) {
            alert('读取失败：'+e.message);
            fileNameElem.textContent = '读取失败';
        }
    };
    reader.readAsArrayBuffer(file);
}

function updateBtn() {
    const btn = document.getElementById('calc-btn');
    if (abSingleData.length && acSingleData.length) {
        btn.disabled = false;
        btn.textContent = '🟢 计算 B→C 修改项';
    } else {
        btn.disabled = true;
        btn.textContent = '🔴 请上传两个文件';
    }
}

function calculateBC() {
    const btn = document.getElementById('calc-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 计算中...';

    const bMap = new Map();
    abSingleData.forEach(x => bMap.set(x.loc, x));
    const cMap = new Map();
    acSingleData.forEach(x => cMap.set(x.loc, x));

    const res = [];
    const allLoc = new Set([...bMap.keys(), ...cMap.keys()]);

    allLoc.forEach(loc => {
        const B = bMap.get(loc);
        const C = cMap.get(loc);
        if (B && !C) {
            res.push({...B, action:'DELETE', remark:'B有C无'});
        } else if (!B && C) {
            res.push({...C, action:'ADD', remark:'B无C有'});
        } else if (B && C && B.partNum !== C.partNum) {
            res.push({...B, action:'DELETE', remark:'料号不同-删旧'});
            res.push({...C, action:'ADD', remark:'料号不同-增新'});
        }
    });

    const group = new Map();
    res.forEach(item => {
        const key = `${item.action}-${item.partNum}-${item.partDesc}`;
        if (!group.has(key)) group.set(key, {...item, locs:[]});
        group.get(key).locs.push(item.loc);
    });

    bcResult = Array.from(group.values()).map(g => ({
        code: g.action === 'ADD' ? 'BC-ADD' : 'BC-DEL',
        product: g.product,
        version: g.version,
        partNum: g.partNum,
        partDesc: g.partDesc,
        qty: g.locs.length,
        loc: LocUtils.mergeLocs(g.locs),
        action: g.action,
        remark: g.remark + ` (${g.locs.length}个)`
    })).sort((a,b) => a.action === 'DELETE' ? -1 : 1);

    render();
    btn.textContent = '✅ 计算完成';
}

function render() {
    const tb = document.getElementById('result-body');
    tb.innerHTML = '';
    if (!bcResult.length) {
        tb.innerHTML = `<tr><td colspan='9' class='error提示'>✅ 无差异</td></tr>`;
    } else {
        bcResult.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = item.action === 'DELETE' ? 'del-row' : 'add-row';
            tr.innerHTML = `
                <td>${item.code}</td>
                <td>${item.product}</td>
                <td>${item.version}</td>
                <td>${item.partNum}</td>
                <td>${item.partDesc}</td>
                <td>${item.qty}</td>
                <td>${item.loc}</td>
                <td>${item.action}</td>
                <td>${item.remark}</td>
            `;
            tb.appendChild(tr);
        });
    }
    document.getElementById('result-section').style.display = 'block';
}

function downloadExcel() {
    if (!bcResult.length) return alert('无结果可下载');
    const head = ['修改项编码','产品型号','共用版本','物料编码','物料描述','数量','位号','操作','备注'];
    const data = [head];
    bcResult.forEach(x => data.push([x.code,x.product,x.version,x.partNum,x.partDesc,x.qty,x.loc,x.action,x.remark]));
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'B→C修改项');
    XLSX.writeFile(wb, 'B_to_C_修改项.xlsx');
}

// =============================================
// 新增：一键复制表格数据功能（仅新增此函数）
// =============================================
function copyTableData() {
    if (!bcResult.length) {
        alert('无数据可复制！');
        return;
    }

    // 组装复制的文本（制表符分隔，粘贴到Excel/记事本都对齐）
    let copyText = '修改项编码\t产品型号\t共用版本\t物料编码\t物料描述\t数量\t位号\t操作\t备注\n';
    bcResult.forEach(item => {
        copyText += `${item.code}\t${item.product}\t${item.version}\t${item.partNum}\t${item.partDesc}\t${item.qty}\t${item.loc}\t${item.action}\t${item.remark}\n`;
    });

    // 执行复制
    navigator.clipboard.writeText(copyText).then(() => {
        alert('✅ 数据已复制到剪贴板！可直接粘贴到Excel/记事本');
    }).catch(err => {
        alert('❌ 复制失败：' + err.message);
    });
}
</script>
</body>
</html>
