<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM修改项计算工具（密码版）</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            display: none; /* 默认隐藏 */
        }
        .login-box {
            width: 380px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .login-box input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #2980b9;
        }
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: bold;
        }
        .upload-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .upload-card {
            flex: 1;
            min-width: 320px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            color: #3498db;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-upload {
            position: relative;
            display: inline-block;
        }
        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 1;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.3s;
        }
        .upload-btn:hover {
            background-color: #2980b9;
        }
        .file-name {
            margin-top: 12px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            min-height: 21px;
        }
        .calc-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 14px 40px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .calc-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #888;
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            display: none;
        }
        .result-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .download-btn {
            padding: 10px 20px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background-color: #e67e22;
        }
        .table-container {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }
        th {
            background-color: #f8f9fa;
            color: #34495e;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 10px 12px;
            border-bottom: 2px solid #e0e0e0;
        }
        td {
            color: #2c3e50;
            padding: 9px 12px;
            border-bottom: 1px solid #f1f1f1;
            white-space: nowrap;
        }
        tr:hover td {
            background-color: #fafbfc;
        }
        .del-row td {
            background-color: #fff5f5;
            color: #c0392b;
        }
        .add-row td {
            background-color: #f1f9f7;
            color: #27ae60;
        }
        .error提示 {
            color: #e74c3c;
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            padding: 15px;
        }
        .success提示 {
            color: #27ae60;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- 密码登录界面（无任何密码提示） -->
<div class="login-box" id="loginBox">
    <h2>BOM 修改项计算工具</h2>
    <input type="password" id="password" placeholder="请输入登录密码">
    <button onclick="checkPassword()">登录</button>
</div>

<!-- 主工具界面（默认隐藏） -->
<div class="container" id="mainContainer">
    <h1 class="title">BOM修改项计算工具（最终版）</h1>
    
    <div class="upload-section">
        <div class="upload-card">
            <h3 class="card-title">
                <i>📄</i> 1. 上传 A→B 修改项 Excel
            </h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ab" accept=".xlsx, .xls">
            </div>
            <div id="file-ab-name" class="file-name">未选择文件（支持.xlsx/.xls格式）</div>
        </div>

        <div class="upload-card">
            <h3 class="card-title">
                <i>📄</i> 2. 上传 A→C 修改项 Excel
            </h3>
            <div class="file-upload">
                <button class="upload-btn">选择文件</button>
                <input type="file" class="file-input" id="file-ac" accept=".xlsx, .xls">
            </div>
            <div id="file-ac-name" class="file-name">未选择文件（支持.xlsx/.xls格式）</div>
        </div>
    </div>

    <button id="calc-btn" class="calc-btn" disabled>
        🔴 请先上传两个Excel文件
    </button>

    <div id="result-section" class="result-section">
        <div class="result-title">
            <span>✅ B→C 修改项计算结果</span>
            <button id="download-btn" class="download-btn">
                📥 下载Excel文件
            </button>
        </div>
        <div class="table-container">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>修改项编码</th>
                        <th>产品型号</th>
                        <th>共用版本</th>
                        <th>物料编码</th>
                        <th>物料描述</th>
                        <th>数量</th>
                        <th>位号</th>
                        <th>操作</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ======================================
    // 密码验证（密码硬编码，页面无任何提示）
    // ======================================
    const correctPassword = "panshukun";
    function checkPassword() {
        const input = document.getElementById('password').value.trim();
        if (input === correctPassword) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        } else {
            alert('密码错误，请重试！');
            // 清空输入框
            document.getElementById('password').value = '';
        }
    }

    // 按回车也能登录
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // ======================================
    // 工具主逻辑（功能完全保留）
    // ======================================
    let abSingleData = [];
    let acSingleData = [];
    let bcResult = [];

    const LocUtils = {
        splitLocs: function(locStr) {
            if (!locStr) return [];
            return locStr.split(/[,，\s]+/).map(loc => loc.trim()).filter(loc => loc);
        },
        mergeLocs: function(locs) {
            if (!locs || locs.length === 0) return '';
            return locs.sort((a, b) => {
                const numA = parseInt(a.replace(/\D/g, '')) || 0;
                const numB = parseInt(b.replace(/\D/g, '')) || 0;
                const typeA = a.replace(/\d/g, '');
                const typeB = b.replace(/\d/g, '');
                return typeA === typeB ? numA - numB : typeA.localeCompare(typeB);
            }).join(',');
        }
    };

    window.onload = function() {
        document.getElementById('file-ab').addEventListener('change', (e) => handleFile(e, 'ab'));
        document.getElementById('file-ac').addEventListener('change', (e) => handleFile(e, 'ac'));
        document.getElementById('calc-btn').addEventListener('click', calculateBC);
        document.getElementById('download-btn').addEventListener('click', downloadExcel);
    };

    function handleFile(e, type) {
        const file = e.target.files[0];
        const fileNameElem = document.getElementById(`file-${type}-name`);
        if (!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['xlsx', 'xls'].includes(ext)) {
            alert('❌ 仅支持Excel文件（.xlsx/.xls格式）');
            fileNameElem.textContent = `❌ 不支持格式：.${ext}`;
            e.target.value = '';
            return;
        }
        fileNameElem.textContent = `⏳ 读取中：${file.name}`;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
                if (json.length < 2) throw new Error("无有效数据（至少表头+1行）");

                // 解析表头
                const header = json[0].map(c => (c+'').toLowerCase().trim());
                const idx = {
                    code: header.findIndex(h => h.includes('修改项编码')),
                    product: header.findIndex(h => h.includes('产品型号')),
                    version: header.findIndex(h => h.includes('共用版本')),
                    partNum: header.findIndex(h => h.includes('物料编码')||h.includes('料号')),
                    partDesc: header.findIndex(h => h.includes('物料描述')),
                    qty: header.findIndex(h => h.includes('数量')),
                    loc: header.findIndex(h => h.includes('位号')),
                    action: header.findIndex(h => h.includes('操作')),
                    remark: header.findIndex(h => h.includes('备注'))
                };

                // 校验核心列
                const missing = ['loc', 'action', 'partNum', 'partDesc'].filter(k => idx[k] === -1);
                if (missing.length > 0) {
                    const fieldMap = { loc: '位号', action: '操作', partNum: '物料编码', partDesc: '物料描述' };
                    throw new Error(`缺少核心列：${missing.map(k => fieldMap[k]).join('、')}`);
                }

                // 拆分多位号
                const singleData = [];
                for (let i=1; i<json.length; i++) {
                    const r = json[i];
                    const locStr = (r[idx.loc]+'').trim();
                    const act = (r[idx.action]+'').trim().toUpperCase();
                    const pn = (r[idx.partNum]+'').trim();
                    
                    // 过滤无效行
                    if (!locStr || !['ADD','DEL','DELETE'].includes(act)) continue;
                    if (act === 'ADD' && !pn) {
                        console.warn(`跳过无效ADD行（无料号）：位号=${locStr}`);
                        continue;
                    }

                    const locs = LocUtils.splitLocs(locStr);
                    const act2 = act === 'DEL' ? 'DELETE' : 'ADD';
                    const rowQty = parseInt(r[idx.qty] || locs.length) || locs.length;
                    const singleQty = Math.max(1, Math.floor(rowQty / locs.length));

                    locs.forEach(loc => {
                        singleData.push({
                            code: (r[idx.code] || '').toString().trim(),
                            product: (r[idx.product] || '').toString().trim(),
                            version: (r[idx.version] || '').toString().trim(),
                            partNum: pn,
                            partDesc: (r[idx.partDesc] || '').toString().trim(),
                            qty: singleQty,
                            loc: loc,
                            action: act2,
                            remark: (r[idx.remark] || '').toString().trim()
                        });
                    });
                }

                // 存储数据
                if (type === 'ab') abSingleData = singleData;
                else acSingleData = singleData;

                fileNameElem.innerHTML = `✅ 已上传：${file.name}<br><span class='success提示'>有效位号：${singleData.length}个</span>`;
                updateBtn();
            } catch (e) {
                alert(`❌ 读取失败：${e.message}`);
                fileNameElem.textContent = `❌ 读取失败：${e.message}`;
                if (type === 'ab') abSingleData = [];
                else acSingleData = [];
                updateBtn();
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function updateBtn() {
        const btn = document.getElementById('calc-btn');
        if (abSingleData.length > 0 && acSingleData.length > 0) {
            btn.disabled = false;
            btn.textContent = '🟢 计算 B→C 修改项';
        } else {
            btn.disabled = true;
            const missing = [];
            if (abSingleData.length === 0) missing.push("A→B文件");
            if (acSingleData.length === 0) missing.push("A→C文件");
            btn.textContent = `🔴 请上传：${missing.join(' + ')}`;
        }
    }

    function calculateBC() {
        const btn = document.getElementById('calc-btn');
        btn.disabled = true;
        btn.textContent = '⏳ 计算中...';

        try {
            // 构建位号映射
            const bMap = new Map();
            abSingleData.forEach(x => bMap.set(x.loc, x));
            const cMap = new Map();
            acSingleData.forEach(x => cMap.set(x.loc, x));

            const singleRes = [];
            const allLoc = new Set([...bMap.keys(), ...cMap.keys()]);

            // 逐个位号判断
            allLoc.forEach(loc => {
                const B = bMap.get(loc);
                const C = cMap.get(loc);

                // 场景1：B有，C无 → DELETE
                if (B && !C) {
                    singleRes.push({
                        code: `BC-DEL-${loc}`,
                        product: B.product,
                        version: B.version,
                        partNum: B.partNum,
                        partDesc: B.partDesc,
                        qty: B.qty,
                        loc: loc,
                        action: 'DELETE',
                        remark: `B板有，C板无：删除${B.partDesc || loc}`
                    });
                }
                // 场景2：B无，C有 → ADD
                else if (!B && C) {
                    singleRes.push({
                        code: `BC-ADD-${loc}`,
                        product: C.product,
                        version: C.version,
                        partNum: C.partNum, // ADD显示C板料号
                        partDesc: C.partDesc,
                        qty: C.qty,
                        loc: loc,
                        action: 'ADD',
                        remark: `B板无，C板有：新增${C.partDesc || loc}`
                    });
                }
                // 场景3：B有，C有但料号不同 → DEL+ADD
                else if (B && C && B.partNum !== C.partNum) {
                    // 删除B板旧料
                    singleRes.push({
                        code: `BC-DEL-${loc}`,
                        product: B.product,
                        version: B.version,
                        partNum: B.partNum,
                        partDesc: B.partDesc,
                        qty: B.qty,
                        loc: loc,
                        action: 'DELETE',
                        remark: `料号变更：删除B板${B.partDesc || loc}（料号：${B.partNum}）`
                    });
                    // 新增C板新料
                    singleRes.push({
                        code: `BC-ADD-${loc}`,
                        product: C.product,
                        version: C.version,
                        partNum: C.partNum, // ADD显示C板料号
                        partDesc: C.partDesc,
                        qty: C.qty,
                        loc: loc,
                        action: 'ADD',
                        remark: `料号变更：新增C板${C.partDesc || loc}（料号：${C.partNum}）`
                    });
                }
            });

            // 合并相同操作的多位号
            const groupMap = new Map();
            singleRes.forEach(item => {
                const groupKey = `${item.action}-${item.partNum}-${item.partDesc}`;
                if (!groupMap.has(groupKey)) {
                    groupMap.set(groupKey, {
                        ...item,
                        locs: [],
                        totalQty: 0,
                        remarkBase: item.remark.split('：')[0] + '：'
                    });
                }
                const group = groupMap.get(groupKey);
                group.locs.push(item.loc);
                group.totalQty += item.qty;
                const remarkContent = item.remark.split('：')[1] || '';
                if (remarkContent && !group.remarkBase.includes(remarkContent)) {
                    group.remarkBase += `${remarkContent}、`;
                }
            });

            // 整理最终结果
            bcResult = Array.from(groupMap.values()).map((group, index) => {
                const cleanRemark = group.remarkBase.replace(/、$/, '') + `（共${group.locs.length}个位号）`;
                return {
                    code: `${group.action === 'ADD' ? 'BC-ADD' : 'BC-DEL'}-${index + 1}`,
                    product: group.product,
                    version: group.version,
                    partNum: group.partNum,
                    partDesc: group.partDesc,
                    qty: group.totalQty,
                    loc: LocUtils.mergeLocs(group.locs),
                    action: group.action,
                    remark: cleanRemark
                };
            }).sort((a, b) => {
                // DELETE在前，ADD在后；同类型按位号排序
                if (a.action !== b.action) return a.action === 'DELETE' ? -1 : 1;
                const numA = parseInt(a.loc.replace(/\D/g, '')) || 0;
                const numB = parseInt(b.loc.replace(/\D/g, '')) || 0;
                return numA - numB;
            });

            // 渲染结果
            renderResult();
            btn.textContent = '✅ 计算完成';
        } catch (e) {
            alert(`❌ 计算错误：${e.message}`);
            btn.disabled = false;
            btn.textContent = '🟢 重新计算';
        }
    }

    function renderResult() {
        const tbody = document.getElementById('result-body');
        tbody.innerHTML = '';
        const resultSection = document.getElementById('result-section');
        
        if (bcResult.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="error提示">✅ B→C无修改项（所有位号完全一致）</td></tr>`;
        } else {
            bcResult.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = item.action === 'DELETE' ? 'del-row' : 'add-row';
                tr.innerHTML = `
                    <td>${item.code}</td>
                    <td>${item.product}</td>
                    <td>${item.version}</td>
                    <td>${item.partNum}</td>
                    <td>${item.partDesc}</td>
                    <td>${item.qty}</td>
                    <td>${item.loc}</td>
                    <td>${item.action}</td>
                    <td>${item.remark}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        resultSection.style.display = 'block';
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    function downloadExcel() {
        if (bcResult.length === 0) {
            alert('✅ B→C无修改项，无需下载');
            return;
        }

        try {
            // 构建Excel数据
            const header = ['修改项编码','产品型号','共用版本','物料编码','物料描述','数量','位号','操作','备注'];
            const excelData = [header];
            bcResult.forEach(item => {
                excelData.push([
                    item.code,
                    item.product,
                    item.version,
                    item.partNum,
                    item.partDesc,
                    item.qty,
                    item.loc,
                    item.action,
                    item.remark
                ]);
            });

            // 生成Excel文件
            const ws = XLSX.utils.aoa_to_sheet(excelData);
            // 适配列宽
            ws['!cols'] = [
                { wch: 18 }, { wch: 18 }, { wch: 8 }, { wch: 22 },
                { wch: 45 }, { wch: 8 }, { wch: 40 }, { wch: 12 }, { wch: 60 }
            ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'B→C修改项');
            
            // 下载文件
            const fileName = `B_to_C_修改项_${new Date().getTime()}.xlsx`;
            XLSX.writeFile(wb, fileName);
            alert(`✅ 下载成功！\n文件名：${fileName}\n路径：浏览器默认下载文件夹`);
        } catch (e) {
            alert(`❌ 下载失败：${e.message}\n请检查浏览器下载权限`);
        }
    }
</script>
</body>
</html>
